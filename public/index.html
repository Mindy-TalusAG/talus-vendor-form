<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalusAg — New Vendor Request</title>
  <style>
    :root {
      --ga:#639922; --gd:#3B6D11; --gl:#EAF3DE;
      --bg:#ffffff; --bg2:#f7f7f5; --bg3:#f0efeb;
      --tx1:#1a1a1a; --tx2:#5a5a5a; --tx3:#909090;
      --bd1:rgba(0,0,0,.35); --bd2:rgba(0,0,0,.18); --bd3:rgba(0,0,0,.10);
      --info-bg:#e8f4fd; --info-bd:#90c5ee; --info-tx:#1255a0;
      --warn-bg:#fff9e6; --warn-bd:#f0c040; --warn-tx:#7a4f00;
      --dng-bg:#fff0f0;  --dng-bd:#f0a0a0;  --dng-tx:#b91c1c;
      --suc-bg:#f0fdf4;  --suc-bd:#86efac;  --suc-tx:#166534;
      --r-md:8px; --r-lg:12px;
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--bg3);color:var(--tx1);min-height:100vh;padding:2rem 1rem 4rem;}
    input,select,textarea,button{font-family:inherit;font-size:14px;}
    input[type=text],input[type=email],input[type=tel],input[type=url],textarea,select{
      width:100%;padding:8px 10px;border:0.5px solid var(--bd1);border-radius:var(--r-md);
      background:var(--bg);color:var(--tx1);outline:none;transition:border-color .15s;
    }
    input:focus,textarea:focus,select:focus{border-color:var(--ga);box-shadow:0 0 0 3px rgba(99,153,34,.15);}
    textarea{resize:vertical;min-height:80px;line-height:1.5;}
    a{color:var(--gd);}
    #wrap{max-width:680px;margin:0 auto;}
    .brand{margin-bottom:1.5rem;}
    .brand img{height:38px;width:auto;display:block;margin-bottom:6px;}
    .brand-sub{font-size:13px;font-weight:500;color:var(--tx2);}
    .prog{display:flex;gap:4px;margin-bottom:1.25rem;}
    .ps{height:4px;flex:1;border-radius:2px;background:var(--bd3);}
    .ps.done{background:var(--ga);opacity:.5;}.ps.act{background:var(--ga);}
    .eyb{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.07em;margin-bottom:4px;}
    .stit{font-size:20px;font-weight:600;color:var(--tx1);margin-bottom:4px;}
    .ssub{font-size:13px;color:var(--tx2);margin-bottom:1.25rem;line-height:1.5;}
    .card{background:var(--bg);border:0.5px solid var(--bd3);border-radius:var(--r-lg);padding:1.25rem;margin-bottom:12px;}
    .slbl{font-size:11px;font-weight:600;color:var(--tx3);letter-spacing:.07em;text-transform:uppercase;border-bottom:0.5px solid var(--bd3);padding-bottom:6px;margin-bottom:12px;}
    .fg{margin-bottom:12px;}.fg:last-child{margin-bottom:0;}
    .fl{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:4px;}
    .req{color:var(--dng-tx);margin-left:2px;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .err{color:var(--dng-tx);font-size:12px;margin-top:4px;}
    .info-b{background:var(--info-bg);border:0.5px solid var(--info-bd);border-radius:var(--r-md);padding:10px 13px;font-size:13px;color:var(--info-tx);line-height:1.6;margin-top:10px;}
    .warn-b{background:var(--warn-bg);border:0.5px solid var(--warn-bd);border-radius:var(--r-md);padding:10px 13px;font-size:13px;color:var(--warn-tx);line-height:1.6;margin-top:10px;}
    .dng-b {background:var(--dng-bg); border:0.5px solid var(--dng-bd); border-radius:var(--r-md);padding:10px 13px;font-size:13px;color:var(--dng-tx); line-height:1.6;margin-top:10px;}
    .suc-b {background:var(--suc-bg); border:0.5px solid var(--suc-bd); border-radius:var(--r-md);padding:10px 13px;font-size:13px;color:var(--suc-tx); line-height:1.6;margin-top:10px;}
    .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .tcard{border:0.5px solid var(--bd2);border-radius:var(--r-md);padding:14px;cursor:pointer;transition:all .12s;}
    .tcard:hover{border-color:var(--ga);}
    .tcard.sel{border-color:var(--ga);background:var(--gl);}
    .tcard input[type=radio]{display:none;}
    .tcttl{font-size:14px;font-weight:600;color:var(--tx1);margin-bottom:4px;}
    .tcard.sel .tcttl{color:var(--gd);}
    .tcsub{font-size:12px;color:var(--tx2);line-height:1.4;}
    .pill{display:inline-flex;align-items:center;padding:7px 14px;border:0.5px solid var(--bd2);border-radius:99px;cursor:pointer;font-size:13px;color:var(--tx2);transition:all .12s;margin:3px;}
    .pill:hover{border-color:var(--ga);}
    .pill.on{border-color:var(--ga);background:var(--gl);color:var(--gd);font-weight:500;}
    .ucard{border:0.5px solid var(--bd2);border-radius:var(--r-md);padding:14px;cursor:pointer;transition:all .12s;}
    .ucard:hover{border-color:var(--bd1);}
    .ucard.sn{border-color:var(--ga);background:var(--gl);}
    .ucard.su{border-color:var(--dng-bd);background:var(--dng-bg);}
    .ucard input[type=radio]{display:none;}
    .ucttl{font-size:14px;font-weight:600;color:var(--tx1);}
    .ucard.sn .ucttl{color:var(--gd);}
    .ucard.su .ucttl{color:var(--dng-tx);}
    .ucsub{font-size:12px;color:var(--tx2);margin-top:4px;}
    .uz{border:1.5px dashed var(--bd2);border-radius:var(--r-md);padding:14px;text-align:center;cursor:pointer;transition:all .12s;}
    .uz:hover{border-color:var(--ga);background:var(--gl);}
    .uz input[type=file]{display:none;}
    .uztxt{font-size:13px;color:var(--tx2);}
    .uztxt strong{color:var(--gd);}
    .fchips{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
    .fchip{display:inline-flex;align-items:center;gap:5px;background:var(--bg2);border:0.5px solid var(--bd3);border-radius:99px;padding:3px 10px;font-size:12px;}
    .fx{cursor:pointer;color:var(--dng-tx);font-size:14px;line-height:1;}
    .w8box{background:var(--bg2);border:0.5px solid var(--bd2);border-radius:var(--r-md);padding:14px;margin-bottom:10px;}
    .w8box-ttl{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:8px;}
    .w8-steps{list-style:none;margin:0 0 12px;}
    .w8-steps li{font-size:13px;color:var(--tx2);padding:3px 0 3px 22px;position:relative;line-height:1.5;}
    .w8-steps li::before{content:attr(data-n);position:absolute;left:0;color:var(--ga);font-weight:600;}
    .w8-link{display:inline-flex;align-items:center;gap:6px;background:var(--gl);border:0.5px solid var(--ga);border-radius:var(--r-md);padding:8px 14px;font-size:13px;font-weight:500;color:var(--gd);text-decoration:none;}
    .w8-link:hover{background:var(--ga);color:#fff;}
    .w8-note{font-size:12px;color:var(--tx3);margin-top:8px;line-height:1.6;}
    .samebox{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:0.5px solid var(--bd3);border-radius:var(--r-md);cursor:pointer;font-size:13px;color:var(--tx2);margin-bottom:12px;}
    .samebox input{accent-color:var(--ga);width:15px;height:15px;flex-shrink:0;}
    .samebox.checked{background:var(--gl);border-color:var(--ga);color:var(--gd);}
    .nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;}
    .btnp{background:var(--ga);color:#fff;border:none;padding:10px 24px;border-radius:var(--r-md);font-size:14px;font-weight:600;cursor:pointer;transition:background .12s;}
    .btnp:hover:not(:disabled){background:var(--gd);}
    .btnp:disabled{background:#aaa;cursor:not-allowed;}
    .btnb{background:transparent;border:0.5px solid var(--bd2);padding:10px 18px;border-radius:var(--r-md);font-size:14px;cursor:pointer;color:var(--tx2);}
    .btnb:hover:not(:disabled){background:var(--bg2);}
    .rrow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:0.5px solid var(--bd3);gap:8px;}
    .rrow:last-child{border-bottom:none;}
    .rlbl{color:var(--tx2);flex:0 0 44%;}
    .rval{color:var(--tx1);text-align:right;word-break:break-word;}
    .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;}
    .bw{background:var(--warn-bg);color:var(--warn-tx);}
    .bd{background:var(--dng-bg);color:var(--dng-tx);}
    .bo{background:var(--suc-bg);color:var(--suc-tx);}
    .sring{width:52px;height:52px;border-radius:50%;border:2px solid var(--ga);background:var(--gl);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:22px;color:var(--gd);}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    .size-warn{font-size:11px;color:var(--tx3);margin-top:5px;}
    .autofilled{background:var(--gl) !important;border-color:var(--ga) !important;}
    .hint{font-size:11px;color:var(--tx3);margin-top:4px;line-height:1.4;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:520px){.frow,.tgrid{grid-template-columns:1fr;}.brand-name{font-size:14px;}}
  </style>
</head>

function onMgrNameInput(val){
  S.mgrName=val;
  // DOM-direct auto-suggest (no re-render)
  var parts=val.trim().toLowerCase().split(/\s+/);
  var emailEl=document.getElementById('mgrEmailField');
  if(emailEl&&(S.mgrEmailAutoFilled||!S.mgrEmail)){
    if(parts[0]){
      var sug=parts[0]+'@talusag.com';
      S.mgrEmail=sug;S.mgrEmailAutoFilled=true;
      emailEl.value=sug;emailEl.classList.add('autofilled');
      var h=document.getElementById('mgrHint');if(h)h.style.display='';
    } else {
      S.mgrEmail='';S.mgrEmailAutoFilled=false;
      emailEl.value='';emailEl.classList.remove('autofilled');
      var h=document.getElementById('mgrHint');if(h)h.style.display='none';
    }
  }
  delete S.errors.mgrName;
}
function onMgrEmailInput(val){
  S.mgrEmail=val;S.mgrEmailAutoFilled=false;
  var el=document.getElementById('mgrEmailField');
  if(el)el.classList.remove('autofilled');
  var h=document.getElementById('mgrHint');if(h)h.style.display='none';
  delete S.errors.mgrEmail;
}

/* Directory search — also DOM-direct for the search field, render() on selection */
function onMgrSearch(val){
  S.mgrSearch=val;
  S.mgrDropOpen=val.length>0;
  if(S.mgrName&&val!==S.mgrName){S.mgrName='';S.mgrEmail='';}
  // Re-render needed here because the dropdown list content changes
  render();
}
function selectMgr(name,email,title){
  S.mgrName=name;S.mgrEmail=email;S.mgrSearch=name;S.mgrDropOpen=false;
  delete S.errors.mgrName;delete S.errors.mgrEmail;
  render();
}
function filteredManagers(){
  if(!S.mgrSearch)return[];
  var q=S.mgrSearch.toLowerCase();
  return S.mgrUsers.filter(function(u){
    return u.name.toLowerCase().includes(q)||u.email.toLowerCase().includes(q);
  }).slice(0,8);
}
async function loadDirectory(){
  if(S.mgrUsersLoaded)return;
  S.mgrUsersLoaded=true;
  try{
    var res=await fetch('/.netlify/functions/get-users');
    var data=await res.json();
    if(data.configured&&data.users&&data.users.length){
      sync(); // preserve anything the user has already typed before re-rendering
      S.mgrUsers=data.users;
      S.mgrDirectoryMode=true;
      if(S.step===1) render(); // only re-render if still on step 1
    }
    // If directory not configured: do nothing — no re-render, no state wipe
  }catch(e){
    // fail silently — no re-render needed
  }
}

function upd(k,v){sync();S[k]=v;delete S.errors[k];render();}
function af(k,fl){S[k]=[...S[k],...Array.from(fl)];render();}
function rmf(k,i){S[k]=S[k].filter((_,j)=>j!==i);render();}
function toggleCat(cat){sync();S.vendorCats=S.vendorCats.includes(cat)?S.vendorCats.filter(c=>c!==cat):[...S.vendorCats,cat];render();}
function toggleSame(){sync();S.sameContact=!S.sameContact;render();}
function scrollTop(){window.scrollTo({top:0,behavior:'smooth'});}

function nxt(){
  sync();
  const e=val(S.step);
  if(Object.keys(e).length){S.errors=e;render();scrollTop();return;}
  S.errors={};S.step++;render();scrollTop();
}
function bk(){sync();S.step--;S.errors={};render();scrollTop();}

/* ── FILE HANDLING ── */
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.readAsDataURL(file);
    r.onload=()=>resolve(r.result.split(',')[1]);
    r.onerror=reject;
  });
}

function totalFileSize(){
  return [...S.w9,...S.w8,...S.bizCert,...S.contract,...S.addl]
    .reduce((sum,f)=>sum+f.size,0);
}

function fmtSize(bytes){
  if(bytes<1024*1024) return `${(bytes/1024).toFixed(0)} KB`;
  return `${(bytes/(1024*1024)).toFixed(1)} MB`;
}

/* ── SUBMIT ── */
async function sub(){
  sync();
  S.sending=true;
  S.sendError=false;
  render();

  const em=buildEmail();
  const allFiles=[...S.w9,...S.w8,...S.bizCert,...S.contract,...S.addl];

  try {
    // Convert all files to base64 for attachment
    const attachments=await Promise.all(allFiles.map(async f=>({
      filename: f.name,
      content:  await fileToBase64(f),
      type:     f.type||'application/octet-stream',
    })));

    const res=await fetch('/.netlify/functions/send-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to:          em.to,
        cc:          em.cc,
        reply_to:    S.yourEmail,
        subject:     em.subject,
        htmlBody:    em.htmlBody,
        textBody:    em.textBody,
        attachments,
      }),
    });

    if(!res.ok){
      const err=await res.text().catch(()=>'');
      console.error('Send failed:',res.status,err);
      throw new Error('Send failed');
    }

    S.submitted=true;
    S.sending=false;
  } catch(err){
    console.error(err);
    S.sending=false;
    S.sendError=true;
  }
  render();
}

/* ── FORM HELPERS ── */
function F(k,lbl,type,ph,req){
  const e=S.errors[k]?`<div class="err">${S.errors[k]}</div>`:'';
  const bs=S.errors[k]?'border-color:#f0a0a0;':'';
  const rl=req?lbl+'<span class="req">*</span>':lbl;
  return `<div class="fg"><label class="fl">${rl}</label><input type="${type}" data-k="${k}" value="${eh(S[k])}" placeholder="${ph||''}" style="${bs}" />${e}</div>`;
}
function TA(k,lbl,ph,req,rows){
  const e=S.errors[k]?`<div class="err">${S.errors[k]}</div>`:'';
  const rl=req?lbl+'<span class="req">*</span>':lbl;
  return `<div class="fg"><label class="fl">${rl}</label><textarea data-k="${k}" rows="${rows||3}" placeholder="${ph||''}">${eh(S[k])}</textarea>${e}</div>`;
}
function UZ(k,lbl,files,multi){
  const chips=files.map((f,i)=>`<span class="fchip">${eh(f.name)} <span style="color:var(--tx3)">(${fmtSize(f.size)})</span><span class="fx" onclick="rmf('${k}',${i})">×</span></span>`).join('');
  return `<div class="fg">
    <label class="fl">${lbl}</label>
    <div class="uz" onclick="document.getElementById('fi_${k}').click()">
      <input type="file" id="fi_${k}" ${multi?'multiple':''} onchange="af('${k}',this.files)" />
      <div class="uztxt"><strong>Click to upload</strong> — any file type accepted</div>
    </div>
    ${files.length?`<div class="fchips">${chips}</div>`:''}
  </div>`;
}

/* ── VALIDATION ── */
function val(step){
  const e={};
  if(step===1){if(!S.yourName.trim())e.yourName='Required';if(!S.yourEmail.trim())e.yourEmail='Required';if(!S.yourDept.trim())e.yourDept='Required';if(!S.mgrName.trim())e.mgrName='Required';if(!S.mgrEmail.trim())e.mgrEmail='Required';}
  if(step===2){
    if(!S.vendorName.trim())e.vendorName='Vendor name is required';
    if(!S.vendorCats.length)e.vendorCats='Select at least one category';
    if(!S.vendorScope.trim())e.vendorScope='Required — describe what this vendor provides';
    if(!S.vendorContext.trim())e.vendorContext='Required — explain the business reason for this setup';
    if(!S.vtype)e.vtype='Please select vendor type to continue';
    if(S.vtype==='us'){if(!S.usA1.trim())e.usA1='Required';if(!S.usCity.trim())e.usCity='Required';if(!S.usSt.trim())e.usSt='Required';if(!S.usZip.trim())e.usZip='Required';}
    if(S.vtype==='intl'){if(!S.intlA1.trim())e.intlA1='Required';if(!S.intlCity.trim())e.intlCity='Required';if(!S.intlCountry.trim())e.intlCountry='Required';}
  }
  if(step===3){if(!S.corpName.trim())e.corpName='Required';if(!S.corpEmail.trim())e.corpEmail='Required';if(!S.sameContact){if(!S.finName.trim())e.finName='Required';if(!S.finEmail.trim())e.finEmail='Required';}}
  if(step===5){
    if(!S.terms)e.terms='Payment terms are required';
    if(S.terms==='other'&&!S.otherTerms.trim())e.otherTerms='Required — describe the terms';
    if(!S.urgency)e.urgency='Please indicate urgency level';
    if(S.urgency==='urgent'&&!S.urgencyNote.trim())e.urgencyNote='Required — include timing, deadline, or business impact';
  }
  return e;
}

function buildAddr(){
  if(S.vtype==='us')return `${S.usA1}${S.usA2?', '+S.usA2:''}, ${S.usCity}, ${S.usSt} ${S.usZip}, United States`;
  return `${S.intlA1}${S.intlA2?', '+S.intlA2:''}, ${S.intlCity}${S.intlRegion?', '+S.intlRegion:''}${S.intlPostal?' '+S.intlPostal:''}, ${S.intlCountry}`;
}

function getMissing(){
  const m=[];
  if(!S.contract.length)m.push({cat:'Document',item:'Signed contract or engagement letter (countersigned by both parties)'});
  if(S.vtype==='us'){if(!S.w9.length)m.push({cat:'Document',item:'W-9 (IRS Form — required for all US vendors)'});}
  if(S.vtype==='intl'){
    if(!S.w8.length)m.push({cat:'Document',item:'W-8BEN-E (IRS Form — vendor fills out and returns to Talus; required before Joanna can add vendor to Ramp)'});
    if(!S.bizCert.length)m.push({cat:'Document',item:'Certificate of Incorporation or Good Standing (or local equivalent)'});

  }
  return m;
}

        ${S.mgrDropOpen && filteredManagers().length ? `
        <div style="position:absolute;left:0;right:0;top:100%;background:var(--bg);border:0.5px solid var(--ga);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);z-index:50;max-height:220px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);">
          ${filteredManagers().map(u=>`<div onclick="selectMgr('${u.name.replace(/'/g,"\\'")}','${u.email}','${(u.title||'').replace(/'/g,"\\'")}');" style="padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:0.5px solid var(--bd3);" onmouseover="this.style.background='var(--gl)'" onmouseout="this.style.background=''"><strong>${eh(u.name)}</strong><span style="color:var(--tx3);margin-left:8px;font-size:12px;">${eh(u.email)}</span>${u.title?`<span style="color:var(--tx3);font-size:11px;display:block;">${eh(u.title)}</span>`:''}</div>`).join('')}
        </div>` : ''}
      </div>
      ${S.mgrName ? `<div style="font-size:12px;color:var(--gd);margin-top:5px;font-weight:500;">Selected: ${eh(S.mgrName)} — ${eh(S.mgrEmail)}</div>` : '<div class="hint">Type a name to search the TalusAg employee directory</div>'}
      ${S.errors.mgrName?`<div class="err">${S.errors.mgrName}</div>`:''}
    </div>` : `
    <div class="fg">
      <label class="fl">Manager's full name<span class="req">*</span></label>
      <input type="text" data-k="mgrName" value="${eh(S.mgrName)}" placeholder="First Last" oninput="onMgrNameInput(this.value)" style="${S.errors.mgrName?'border-color:#f0a0a0;':''}" />
      ${S.errors.mgrName?`<div class="err">${S.errors.mgrName}</div>`:''}
    </div>
    <div class="fg">
      <label class="fl">Manager's email<span class="req">*</span></label>
      <input id="mgrEmailField" type="email" data-k="mgrEmail" value="${eh(S.mgrEmail)}" placeholder="manager@talusag.com" class="${S.mgrEmailAutoFilled&&S.mgrEmail?'autofilled':''}" oninput="onMgrEmailInput(this.value)" />
      <div id="mgrHint" class="hint" style="${S.mgrEmailAutoFilled&&S.mgrEmail?'':'display:none;'}">Auto-suggested — update if their email is different</div>
      ${S.errors.mgrEmail?`<div class="err">${S.errors.mgrEmail}</div>`:''}
    </div>`}
  </div>
  <div class="nav"><span></span><button class="btnp" onclick="nxt()">Continue →</button></div>`;}

/* ── STEP 2 ── */
function r2(){
  const verr=S.errors.vtype?`<div class="err" style="margin-top:6px;">${S.errors.vtype}</div>`:'';
  const cerr=S.errors.vendorCats?`<div class="err">${S.errors.vendorCats}</div>`:'';
  const catPills=CATS.map(c=>`<span class="pill ${S.vendorCats.includes(c)?'on':''}" onclick="toggleCat('${c}')">${c}</span>`).join('');
  const showOther=S.vendorCats.includes('Other');
  const addrUS=`<div class="card" style="margin-top:10px;"><div class="slbl">Billing address — US</div>
    ${F('usA1','Address line 1','text','123 Main St',true)}${F('usA2','Address line 2','text','Suite, floor, etc. (optional)',false)}
    <div class="frow">${F('usCity','City','text','',true)}${F('usSt','State','text','e.g. IL',true)}</div>
    ${F('usZip','ZIP code','text','',true)}</div>`;
  const addrIntl=`<div class="card" style="margin-top:10px;"><div class="slbl">Billing address — international</div>
    ${F('intlA1','Address line 1','text','Street address',true)}${F('intlA2','Address line 2','text','Unit, floor, etc. (optional)',false)}
    <div class="frow">${F('intlCity','City','text','',true)}${F('intlRegion','Region / Province','text','If applicable (optional)',false)}</div>
    <div class="frow">${F('intlPostal','Postal code','text','If applicable (optional)',false)}${F('intlCountry','Country','text','',true)}</div></div>`;
  const addrPh=`<div style="border:1.5px dashed #ddd;border-radius:8px;padding:16px;margin-top:10px;text-align:center;"><p style="font-size:13px;font-style:italic;color:#aaa;">Select vendor type above to continue with billing address.</p></div>`;
  return hdr()+`
  <div class="card"><div class="slbl">Vendor company</div>
    ${F('vendorName','Company / vendor name (legal name)','text','Legal name on contract',true)}
    ${F('vendorSite','Company website','url','https:// (optional)',false)}
  </div>
  <div class="card"><div class="slbl">What does this vendor provide?</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Select all that apply.</p>
    <div>${catPills}</div>${cerr}
    ${showOther?`<div style="margin-top:10px;">${F('vendorCatOther','Describe the "other" category','text','',false)}</div>`:''}
  </div>
  <div class="card"><div class="slbl">Scope of work</div>
    ${TA('vendorScope','What does this vendor do and what are they providing to Talus?','Be specific — e.g. "Monthly structural engineering review for our Kenya site" or "Supply of solar panels for Project X"',true,3)}
  </div>
  <div class="card"><div class="slbl">Business context &amp; reason for setup</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Help the AP team and Hiro prioritize and approve. The more detail, the faster this moves.</p>
    ${TA('vendorContext','Why does this vendor need to be set up now? What is at stake?','e.g. "Services have been rendered — ready to invoice on delivery confirmation" / "Vendor requires 50% upfront before work begins" / "Equipment shipment on hold pending payment — needed on site by [date]" / "Contract go-live blocked until AP is established"',true,4)}
  </div>
  <div class="card"><div class="slbl">Vendor type</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Determines billing address format and required documents.</p>
    <div class="tgrid">
      <label class="tcard ${S.vtype==='us'?'sel':''}"><input type="radio" name="vt" value="us" ${S.vtype==='us'?'checked':''} onchange="upd('vtype','us')" /><div class="tcttl">US Vendor</div><div class="tcsub">W-9 required. Banking collected by Ramp directly from your vendor.</div></label>
      <label class="tcard ${S.vtype==='intl'?'sel':''}"><input type="radio" name="vt" value="intl" ${S.vtype==='intl'?'checked':''} onchange="upd('vtype','intl')" /><div class="tcttl">International Vendor</div><div class="tcsub">Compliance documents required. Banking is collected by Ramp directly from your vendor.</div></label>
    </div>${verr}
  </div>
  ${S.vtype==='us'?addrUS:S.vtype==='intl'?addrIntl:addrPh}
  <div class="nav"><button class="btnb" onclick="bk()">← Back</button><button class="btnp" onclick="nxt()">Continue →</button></div>`;}

/* ── STEP 3 ── */
function r3(){return hdr()+`
  <div class="card"><div class="slbl">Corporate contact</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Main business contact at the vendor company.</p>
    ${F('corpName','Full name','text','',true)}
    <div class="frow">${F('corpEmail','Email','email','',true)}${F('corpPhone','Phone','tel','(optional)',false)}</div>
  </div>
  <div class="card"><div class="slbl">Finance / AP contact</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">This person will receive the setup email from Joanna and a separate email from Ramp to enter banking details.</p>
    <label class="samebox ${S.sameContact?'checked':''}" onclick="toggleSame()">
      <input type="checkbox" ${S.sameContact?'checked':''} onchange="" />
      Finance / AP contact is the same person as the corporate contact above
    </label>
    ${S.sameContact
      ?`<div class="info-b">The corporate contact's details will be used for all finance communications.</div>`
      :`${F('finName','Full name','text','',true)}<div class="frow">${F('finEmail','Email','email','',true)}${F('finPhone','Phone','tel','(optional)',false)}</div>`}
  </div>
  <div class="nav"><button class="btnb" onclick="bk()">← Back</button><button class="btnp" onclick="nxt()">Continue →</button></div>`;}

/* ── STEP 4 ── */
function r4(){
  const isUS=S.vtype==='us';
  const sizeMB=(totalFileSize()/(1024*1024)).toFixed(1);
  const sizeWarn=totalFileSize()>15*1024*1024
    ?`<div class="dng-b" style="margin-bottom:10px;">Total file size is ${sizeMB} MB — please keep attachments under 20 MB combined to ensure delivery.</div>`:
    totalFileSize()>0?`<p class="size-warn">Total uploaded: ${sizeMB} MB</p>`:'';
  const w8Sec=`<div class="w8box">
    <div class="w8box-ttl">What is the W-8BEN-E and what do you need to do?</div>
    <ul class="w8-steps">
      <li data-n="1.">Download the blank form from the IRS using the link below.</li>
      <li data-n="2.">Forward it to your vendor's finance contact — they fill it out, not you.</li>
      <li data-n="3.">They sign it and return it to you (it comes to Talus, not to the IRS).</li>
      <li data-n="4.">Upload the completed, signed form here — or reply to the AP email thread with it when you have it.</li>
    </ul>
    <a class="w8-link" href="https://www.irs.gov/forms-pubs/about-form-w-8-ben-e" target="_blank">Download W-8BEN-E from IRS.gov →</a>
    <p class="w8-note">Don't have it today? That's okay — you can submit it later by replying to the email thread this form generates. Just know that AP cannot add this vendor to Ramp until the completed W-8BEN-E is on file. The sooner your vendor returns it, the sooner setup can finish.<br/><br/>This form certifies the vendor's foreign status and is valid for 3 years once signed. If your vendor has never heard of it, that's completely normal — many smaller international companies haven't. The IRS page above has plain-language instructions you can forward to them.</p>
  </div>
  ${UZ('w8','Upload completed W-8BEN-E (signed by vendor)',S.w8,false)}`;
  return hdr()+`
  <div class="warn-b" style="margin-bottom:12px;margin-top:0;">Fill in as much as you can — nothing on this page blocks submission. Every blank field or missing document will be clearly flagged in the outbound email so Joanna and you both know what still needs to be gathered.</div>
  ${isUS?`
  <div class="card"><div class="slbl">US vendor document</div>
    ${UZ('w9','W-9 (IRS Form, signed)',S.w9,false)}
    <div class="info-b" style="margin-top:10px;"><strong>Banking details are not collected here.</strong><br/><br/>Once this form is submitted, the vendor's finance contact will receive a direct email from <strong>Ramp</strong> (TalusAg's payment platform) with a secure link to enter their ACH or wire transfer details directly. TalusAg does not collect, enter, or store vendor banking information at any point in this process.<br/><br/>Let your vendor contact know to watch for the Ramp email — it sometimes lands in spam. They must complete that step before any payments can be issued.</div>
  </div>`:`
  <div class="card"><div class="slbl">Banking information</div>
    <div class="info-b" style="margin-top:0;">
      <strong>Banking details are not collected here.</strong><br/><br/>
      Once this form is submitted, the vendor's finance contact will receive a direct email from <strong>Ramp</strong> with a secure link to enter their own banking details. TalusAg does not collect, store, or have access to vendor banking information at any point in this process.<br/><br/>
      <strong>Important:</strong> TalusAg is not liable for any errors in banking details entered directly by the vendor into Ramp. It is the vendor's responsibility to ensure their information is correct.
    </div>
  </div>
  <div class="card"><div class="slbl">International compliance documents</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:12px;">Upload what you have. Both are standard US procurement requirements for international vendors — anything missing will be flagged and can be submitted later via the AP email thread.</p>
    ${w8Sec}
    <div style="margin-top:14px;">${UZ('bizCert','Certificate of Incorporation or Good Standing (or local equivalent)',S.bizCert,false)}</div>
  </div>`}
  <div class="card"><div class="slbl">Signed contract</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:10px;">Countersigned by both parties. Engagement letters acceptable if scope and billing are confirmed.</p>
    ${UZ('contract','Signed contract or engagement letter',S.contract,false)}
  </div>
  <div class="card"><div class="slbl">Additional documents</div>
    ${UZ('addl','SOW, amendments, insurance certs, or any other supporting documents (optional)',S.addl,true)}
    ${sizeWarn}
  </div>
  <div class="nav"><button class="btnb" onclick="bk()">← Back</button><button class="btnp" onclick="nxt()">Continue →</button></div>`;}

/* ── STEP 5 ── */
function r5(){
  const needsP=S.terms==='other'||S.urgency==='urgent';
  const te=S.errors.terms?`<div class="err">${S.errors.terms}</div>`:'';
  const ue=S.errors.urgency?`<div class="err">${S.errors.urgency}</div>`:'';
  return hdr()+`
  <div class="card"><div class="slbl">Payment terms</div>
    <div>${['net30','net60','net90','other'].map(t=>`<span class="pill ${S.terms===t?'on':''}" onclick="upd('terms','${t}')">${{net30:'Net 30',net60:'Net 60',net90:'Net 90',other:'Other'}[t]}</span>`).join('')}</div>${te}
    ${S.terms==='other'?`<div style="margin-top:12px;">${TA('otherTerms','Describe the payment terms','e.g. 50% upfront before work begins / faster than Net 30 required because...',true,3)}<div class="warn-b">Non-standard terms require Patricia\'s approval — she will be CC\'d automatically.</div></div>`:''}
  </div>
  <div class="card"><div class="slbl">Request urgency</div>
    <p style="font-size:13px;color:var(--tx2);margin-bottom:12px;">Normal process is ~3 weeks. As the vendor owner, you can push the vendor to respond to Joanna and complete Ramp's banking step — that's the biggest lever on timeline.</p>
    <div class="tgrid">
      <label class="ucard ${S.urgency==='normal'?'sn':''}"><input type="radio" name="urg" value="normal" ${S.urgency==='normal'?'checked':''} onchange="upd('urgency','normal')" /><div class="ucttl">Normal process is fine</div><div class="ucsub">Standard ~3 week timeline.</div></label>
      <label class="ucard ${S.urgency==='urgent'?'su':''}"><input type="radio" name="urg" value="urgent" ${S.urgency==='urgent'?'checked':''} onchange="upd('urgency','urgent')" /><div class="ucttl">Needs urgent attention</div><div class="ucsub">Patricia will be CC'd. Reason required.</div></label>
    </div>${ue}
    ${S.urgency==='urgent'?`<div style="margin-top:12px;">${TA('urgencyNote','Why is this urgent?','Include context on timing, deadline, or business impact — e.g. project go-live date, equipment held at port, contract milestone, site dependency...',true,3)}<div class="dng-b">Patricia will be CC'd for visibility and prioritization.</div></div>`:''}
  </div>
  ${needsP?`<div class="warn-b">Patricia (Patricia@talusag.com) will be CC'd based on your selections above.</div>`:''}
  <div class="card"><div class="slbl">Additional comments</div>
    ${TA('comments','Anything else the AP team should know','Scope context, relationship notes, special instructions — optional.',false,3)}
  </div>
  <div class="nav"><button class="btnb" onclick="bk()">← Back</button><button class="btnp" onclick="nxt()">Review →</button></div>`;}

/* ── STEP 6 ── */
function r6(){
  const em=buildEmail();
  const fin=finContact();
  const allFiles=[...S.w9,...S.w8,...S.bizCert,...S.contract,...S.addl];
  const tLbl={net30:'Net 30',net60:'Net 60',net90:'Net 90',other:`Other — ${S.otherTerms}`}[S.terms]||S.terms;
  const catStr=S.vendorCats.map(c=>c==='Other'?`Other: ${S.vendorCatOther||'(unspecified)'}`:c).join(', ');
  const btnLabel=S.sending?`<span class="spinner"></span>Sending...`:'Submit request';
  return hdr()+`
  ${em.miss.length?`<div class="warn-b" style="margin-bottom:12px;"><strong>Outstanding items (${em.miss.length}):</strong><br/><br/>${em.miss.map(m=>`• ${m.cat}: ${m.item}`).join('<br/>')}<br/><br/>You can still submit — these will be flagged in the email.</div>`:`<div class="suc-b" style="margin-bottom:12px;">All required documents and information provided.</div>`}
  ${S.sendError?`<div class="dng-b" style="margin-bottom:12px;">Something went wrong. Please try again, or email AP@talusag.com directly and CC your manager.</div>`:''}
  <div class="card"><div class="slbl">Requestor</div>
    <div class="rrow"><span class="rlbl">Name</span><span class="rval">${eh(S.yourName)}</span></div>
    <div class="rrow"><span class="rlbl">Email</span><span class="rval">${eh(S.yourEmail)}</span></div>
    <div class="rrow"><span class="rlbl">Department</span><span class="rval">${eh(S.yourDept)}</span></div>
    <div class="rrow"><span class="rlbl">Manager</span><span class="rval">${eh(S.mgrName)} — ${eh(S.mgrEmail)}</span></div>
  </div>
  <div class="card"><div class="slbl">Vendor</div>
    <div class="rrow"><span class="rlbl">Company</span><span class="rval">${eh(S.vendorName)}</span></div>
    <div class="rrow"><span class="rlbl">Category</span><span class="rval">${eh(catStr)}</span></div>
    <div class="rrow"><span class="rlbl">Type</span><span class="rval">${S.vtype==='us'?'US Vendor':'International Vendor'}</span></div>
    <div class="rrow"><span class="rlbl">Billing</span><span class="rval">${eh(buildAddr())}</span></div>
    <div class="rrow"><span class="rlbl">Corporate contact</span><span class="rval">${eh(S.corpName)}</span></div>
    <div class="rrow"><span class="rlbl">Finance contact</span><span class="rval">${S.sameContact?`${eh(S.corpName)} (same as corporate)`:eh(fin.name)+' — '+eh(fin.email)}</span></div>
  </div>
  <div class="card"><div class="slbl">Terms & urgency</div>
    <div class="rrow"><span class="rlbl">Payment terms</span><span class="rval">${eh(tLbl)}</span></div>
    <div class="rrow"><span class="rlbl">Urgency</span><span class="rval">${S.urgency==='urgent'?'<span class="badge bd">URGENT</span>':'<span class="badge bo">Normal</span>'}</span></div>
    ${S.urgency==='urgent'?`<div class="rrow"><span class="rlbl">Urgency reason</span><span class="rval">${eh(S.urgencyNote)}</span></div>`:''}
  </div>
  <div class="card"><div class="slbl">Documents (${allFiles.length} will be attached)</div>
    ${allFiles.length?allFiles.map(f=>`<div class="rrow"><span class="rlbl">File</span><span class="rval">${eh(f.name)} — ${fmtSize(f.size)}</span></div>`).join(''):`<p style="font-size:13px;color:var(--tx3);">No files uploaded — outstanding items will be flagged in email.</p>`}
  </div>
  <div class="card"><div class="slbl">Email routing</div>
    <div class="rrow"><span class="rlbl">To</span><span class="rval">${eh(em.to)}</span></div>
    <div class="rrow"><span class="rlbl">CC</span><span class="rval">${eh(em.cc)}</span></div>
    <div class="rrow"><span class="rlbl">Subject</span><span class="rval">${eh(em.subject)}</span></div>
    ${em.needsP?`<div style="margin-top:8px;"><span class="badge bw">Patricia CC'd</span></div>`:''}
  </div>
  <div class="nav">
    <button class="btnb" onclick="bk()" ${S.sending?'disabled':''}>← Back</button>
    <button class="btnp" style="padding:12px 32px;font-size:15px;" onclick="sub()" ${S.sending?'disabled':''}>${btnLabel}</button>
  </div>`;}

/* ── SUCCESS ── */
function rDone(){
  const fin=finContact();
  return `<div style="text-align:center;padding:2rem 0 1.5rem;">
    <div class="sring">✓</div>
    <div style="font-size:22px;font-weight:600;color:var(--tx1);margin-bottom:8px;">Request submitted</div>
    <div style="font-size:14px;color:var(--tx2);max-width:400px;margin:0 auto;line-height:1.6;">Your request for <strong>${eh(S.vendorName)}</strong> has been sent to AP@talusag.com with all attached documents. Joanna will reach out to <strong>${eh(fin.name)}</strong> to begin setup.</div>
  </div>
  <div style="margin:1.5rem 0;border-top:0.5px solid #eee;"></div>
  <div style="text-align:center;">
    <p style="font-size:13px;color:var(--tx3);margin-bottom:1rem;">Need to submit another vendor?</p>
    <button class="btnb" onclick="rst()">Start a new request</button>
  </div>`;}

function rst(){
  Object.assign(S,{step:1,errors:{},sending:false,sendError:false,submitted:false,yourName:'',yourEmail:'',yourDept:'',mgrName:'',mgrEmail:'',mgrEmailAutoFilled:false,mgrDirectoryMode:false,mgrUsers:[],mgrUsersLoaded:false,mgrSearch:'',mgrDropOpen:false,vendorName:'',vendorSite:'',vendorCats:[],vendorCatOther:'',vendorScope:'',vendorContext:'',vtype:'',usA1:'',usA2:'',usCity:'',usSt:'',usZip:'',intlA1:'',intlA2:'',intlCity:'',intlRegion:'',intlPostal:'',intlCountry:'',corpName:'',corpEmail:'',corpPhone:'',sameContact:false,finName:'',finEmail:'',finPhone:'',w9:[],w8:[],bizCert:[],contract:[],addl:[],terms:'',otherTerms:'',urgency:'',urgencyNote:'',comments:''});
  render();
}

function render(){
  document.getElementById('va').innerHTML=S.submitted?rDone():[r1,r2,r3,r4,r5,r6][S.step-1]();
}
render();
</script>
</body>
</html>
